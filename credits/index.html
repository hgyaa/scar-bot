<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>scar — Credits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000;
  --surface: #080808;
  --surface2: #0d0d0d;
  --border: #1a1a1a;
  --border2: #2a2a2a;
  --accent: #e2e2e2;
  --accent2: #b91c2e;
  --accent-glow: rgba(185,28,46,0.15);
  --accent-pale: rgba(255,255,255,0.04);
  --text: #d8d8d8;
  --muted: #8c8c8c;
  --dim: #606060;
  --expo: cubic-bezier(0.16,1,0.3,1);
  --smooth: cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-weight:300;overflow-x:hidden;min-height:100vh;}

#stars-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 44px;background:rgba(0,0,0,0.88);border-bottom:1px solid rgba(226,226,226,0.06);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.nav-left{display:flex;align-items:center;gap:32px;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo-text{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:#fff;letter-spacing:-0.02em;}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-link{color:var(--muted);text-decoration:none;font-size:0.82rem;font-weight:400;padding:6px 14px;border-radius:6px;transition:color .25s,background .25s;letter-spacing:.01em;}
.nav-link:hover,.nav-link.active{color:var(--accent);background:var(--accent-pale);}
.nav-cta{background:rgba(226,226,226,0.1);color:var(--accent);border:1px solid rgba(226,226,226,0.25);border-radius:8px;padding:8px 20px;font-family:'Outfit',sans-serif;font-size:0.82rem;font-weight:500;text-decoration:none;display:flex;align-items:center;gap:7px;transition:all .25s;letter-spacing:.03em;}
.nav-cta:hover{background:rgba(226,226,226,0.18);border-color:rgba(226,226,226,0.5);color:#fff;box-shadow:0 0 20px rgba(226,226,226,0.12);}

main{position:relative;z-index:1;padding-top:100px;}

/* PAGE HEADER */
.page-header{text-align:center;padding:60px 40px 20px;position:relative;}
.page-eyebrow{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:.32em;color:var(--accent2);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;opacity:0;animation:fadeUp .8s var(--expo) .1s forwards;}
.page-eyebrow::before,.page-eyebrow::after{content:'';width:20px;height:1px;background:var(--accent2);}
.page-title{font-family:'Syne',sans-serif;font-size:clamp(2.4rem,5vw,3.8rem);font-weight:800;color:#fff;letter-spacing:-0.04em;line-height:1.05;margin-bottom:14px;opacity:0;animation:fadeUp .8s var(--expo) .2s forwards;}
.page-title .glow-text{background:linear-gradient(135deg,#ffffff 0%,#b91c2e 50%,#ffffff 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite;}
.page-sub{color:var(--muted);font-size:.92rem;max-width:480px;margin:0 auto;line-height:1.7;opacity:0;animation:fadeUp .8s var(--expo) .3s forwards;}

@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* GALAXY NEBULA GLOW */
.nebula{position:fixed;pointer-events:none;z-index:0;}
.nebula-1{top:-200px;left:-150px;width:700px;height:700px;background:radial-gradient(ellipse,rgba(185,28,46,0.07) 0%,transparent 65%);animation:nebulaDrift 20s ease-in-out infinite alternate;}
.nebula-2{bottom:-100px;right:-200px;width:600px;height:600px;background:radial-gradient(ellipse,rgba(226,226,226,0.05) 0%,transparent 65%);animation:nebulaDrift 25s ease-in-out infinite alternate-reverse;}
@keyframes nebulaDrift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,20px) scale(1.05)}}

/* CREDITS GRID */
.credits-section{padding:60px 80px 120px;max-width:1100px;margin:0 auto;}

.credits-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:60px;padding-top:20px;}

/* CARD */
.credit-card{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  opacity:0;
  animation:cardIn .9s var(--expo) forwards;
}
.credit-card:nth-child(1){animation-delay:.35s;}
.credit-card:nth-child(2){animation-delay:.52s;}
.credit-card:nth-child(3){animation-delay:.69s;}

@keyframes cardIn{
  from{opacity:0;transform:translateY(40px) scale(0.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* FLOATING ASTRONAUT WRAPPER */
.astronaut-wrap{
  position:relative;
  width:200px;
  height:260px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  animation:floatBob 5s ease-in-out infinite;
}
.credit-card:nth-child(2) .astronaut-wrap{
  animation-delay: -2.5s;
}
.credit-card:nth-child(3) .astronaut-wrap{
  animation-delay: -1.2s;
}

@keyframes floatBob{
  0%,100%{transform:translateY(0) rotate(-1deg);}
  25%{transform:translateY(-14px) rotate(1.5deg);}
  50%{transform:translateY(-8px) rotate(-0.5deg);}
  75%{transform:translateY(-18px) rotate(1deg);}
}

/* JETPACK */
.jetpack{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:80px;
  height:70px;
}

/* FLAME particles */
.flame-wrap{
  position:absolute;
  bottom:-18px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:6px;
}
.flame{
  width:10px;
  border-radius:50% 50% 30% 30%;
  animation:flameFlicker 0.18s ease-in-out infinite alternate;
  transform-origin:top center;
  filter:blur(1px);
}
.flame.f1{height:22px;background:linear-gradient(to bottom,#fff8e1,#ffab40,transparent);animation-delay:0s;}
.flame.f2{height:30px;background:linear-gradient(to bottom,#fff,#ff6f00,#7c4dff,transparent);animation-delay:.06s;}
.flame.f3{height:22px;background:linear-gradient(to bottom,#fff8e1,#ffab40,transparent);animation-delay:.12s;}
@keyframes flameFlicker{
  0%{transform:scaleX(1) scaleY(1) rotate(-3deg);}
  100%{transform:scaleX(1.25) scaleY(0.85) rotate(3deg);}
}

/* PROFILE PICTURE */
.pfp-ring{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:130px;
  height:130px;
  border-radius:50%;
  padding:3px;
  background:conic-gradient(from 180deg, #e2e2e2, #5865f2, #b91c2e, #e2e2e2);
  animation:ringRotate 4s linear infinite;
  box-shadow:0 0 28px rgba(185,28,46,0.25), 0 0 60px rgba(185,28,46,0.15);
}
@keyframes ringRotate{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}

.pfp-inner{
  width:100%;
  height:100%;
  border-radius:50%;
  overflow:hidden;
  background:var(--surface2);
  border:3px solid var(--bg);
}
.pfp-inner img{width:100%;height:100%;object-fit:cover;display:block;}

/* CARD INFO */
.card-info{
  margin-top:16px;
  text-align:center;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:22px 32px 18px;
  width:220px;
  position:relative;
  overflow:hidden;
}
.card-info::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(226,226,226,0.4),transparent);
}
.card-display{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;color:#fff;letter-spacing:-0.02em;margin-bottom:3px;}
.card-username{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);letter-spacing:.06em;margin-bottom:10px;}
.card-username::before{content:'@';}
.card-role{
  display:inline-block;
  font-family:'DM Mono',monospace;
  font-size:.6rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  padding:4px 12px;
  border-radius:20px;
  border:1px solid rgba(226,226,226,0.25);
  background:rgba(226,226,226,0.07);
  color:var(--accent);
  margin-bottom:10px;
}
.card-desc{color:var(--muted);font-size:.75rem;line-height:1.6;margin-top:8px;}

/* SHOOTING STARS */
.shooting-star{
  position:fixed;
  width:2px;
  height:2px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  z-index:0;
}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:22px 80px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;flex-wrap:wrap;gap:12px;}
.footer-logo{font-family:'Syne',sans-serif;font-weight:700;color:rgba(255,255,255,0.25);font-size:.88rem;letter-spacing:-0.01em;}
.footer-links{display:flex;gap:18px;}
.footer-link{color:var(--dim);text-decoration:none;font-size:.75rem;transition:color .2s;font-family:'DM Mono',monospace;letter-spacing:.04em;}
.footer-link:hover{color:var(--accent);}
.nav-discord{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:rgba(88,101,242,0.12);border:1px solid rgba(88,101,242,0.25);color:#7289da;text-decoration:none;transition:all .25s;flex-shrink:0;}
.nav-discord:hover{background:rgba(88,101,242,0.25);border-color:rgba(88,101,242,0.5);color:#fff;box-shadow:0 0 16px rgba(88,101,242,0.2);}
.nav-right{display:flex;align-items:center;gap:10px;}


/* ═══ DARK Y2K NIGHT THEME ═══ */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.055) 2px,rgba(0,0,0,0.055) 4px);pointer-events:none;z-index:8999;}
#noise-layer{position:fixed;inset:0;opacity:.03;pointer-events:none;z-index:9000;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
*{cursor:none!important}

/* ─── CROSSHAIR CURSOR ─── */
#cur-cross{position:fixed;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);width:28px;height:28px;}
#cur-cross::before,#cur-cross::after{content:'';position:absolute;background:#b91c2e;transition:all .12s;}
#cur-cross::before{left:50%;top:0;width:1px;height:100%;transform:translateX(-50%);}
#cur-cross::after{top:50%;left:0;height:1px;width:100%;transform:translateY(-50%);}
#cur-center{position:fixed;pointer-events:none;z-index:100000;width:4px;height:4px;background:#e2e2e2;transform:translate(-50%,-50%);box-shadow:0 0 4px #b91c2e;}
#cur-outer{position:fixed;pointer-events:none;z-index:99998;width:44px;height:44px;border:1px solid rgba(185,28,46,.35);transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s,opacity .3s;}
/* corner ticks on outer ring */
#cur-outer::before,#cur-outer::after{content:'';position:absolute;border-color:rgba(185,28,46,.8);border-style:solid;}
#cur-outer::before{top:-1px;left:-1px;width:8px;height:8px;border-width:2px 0 0 2px;}
#cur-outer::after{bottom:-1px;right:-1px;width:8px;height:8px;border-width:0 2px 2px 0;}

/* ─── GLITCH FIX: only apply glitch via shadow, not animation property ─── */
@keyframes txt-glitch{
  0%,88%,100%{text-shadow:none;}
  89%{text-shadow:-3px 0 #b91c2e, 3px 0 rgba(255,255,255,.2);}
  91%{text-shadow:3px 0 #b91c2e,-1px 0 rgba(255,255,255,.15);}
  93%{text-shadow:none;}
  94%{text-shadow:-1px 0 rgba(185,28,46,.6),1px 0 rgba(255,255,255,.1);}
  96%{text-shadow:none;}
}
/* apply glitch AFTER the element is visible — use a second animation layered */
.hero-title{animation:fadeUp .9s cubic-bezier(0.16,1,0.3,1) .1s both, txt-glitch 8s 1.5s steps(1) infinite!important;}
.page-title{animation:fadeUp .8s cubic-bezier(0.16,1,0.3,1) .2s both, txt-glitch 8s 2s steps(1) infinite!important;}
.cmd-hero-title{animation:fadeUp .9s cubic-bezier(0.16,1,0.3,1) .18s both, txt-glitch 8s 1.8s steps(1) infinite!important;}

.feat-icon{font-size:.85rem;color:var(--accent2);font-family:'DM Mono',monospace;font-weight:700;letter-spacing:.05em;}
.callout-icon{color:var(--accent2);font-style:normal;font-weight:700;}

</style>
</head>

<script>
// Stars
(function(){
  const canvas=document.getElementById('stars-canvas');
  const ctx=canvas.getContext('2d');
  let stars=[];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  function init(){
    stars=[];
    for(let i=0;i<220;i++){
      stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2+0.15,alpha:Math.random()*.5+.1,speed:Math.random()*.4+.06,phase:Math.random()*Math.PI*2});
    }
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    frame++;
    stars.forEach(s=>{
      const p=s.alpha+Math.sin(frame*s.speed*.04+s.phase)*.18;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(155,155,155,${Math.max(.04,Math.min(.8,p))})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{resize();init();});
  resize();init();draw();
})();

// Shooting stars
(function(){
  function shoot(){
    const el=document.createElement('div');
    el.className='shooting-star';
    const startX=Math.random()*window.innerWidth;
    const startY=Math.random()*window.innerHeight*0.5;
    el.style.cssText=`left:${startX}px;top:${startY}px;position:fixed;z-index:0;pointer-events:none;`;
    document.body.appendChild(el);
    const angle=30+Math.random()*20;
    const dist=150+Math.random()*200;
    const rad=angle*Math.PI/180;
    el.animate([
      {transform:'translate(0,0)',opacity:0,width:'2px',boxShadow:'none'},
      {transform:`translate(0,0)`,opacity:1,width:'80px',boxShadow:'0 0 4px #fff, 0 0 10px rgba(226,226,226,0.8)',offset:0.05},
      {transform:`translate(${dist*Math.cos(rad)}px,${dist*Math.sin(rad)}px)`,opacity:0,width:'2px'}
    ],{duration:700+Math.random()*400,easing:'ease-out'}).onfinish=()=>el.remove();
    setTimeout(shoot,1200+Math.random()*3000);
  }
  setTimeout(shoot,800);
})();

<script>
(function(){
  const cross=document.getElementById('cur-cross'),
        center=document.getElementById('cur-center'),
        outer=document.getElementById('cur-outer');
  let mx=innerWidth/2,my=innerHeight/2,ox=mx,oy=my;
  document.addEventListener('mousemove',e=>{
    mx=e.clientX;my=e.clientY;
    cross.style.left=mx+'px';cross.style.top=my+'px';
    center.style.left=mx+'px';center.style.top=my+'px';
  });
  (function loop(){
    ox+=(mx-ox)*.08;oy+=(my-oy)*.08;
    outer.style.left=ox+'px';outer.style.top=oy+'px';
    requestAnimationFrame(loop);
  })();
  setInterval(()=>{
    if(Math.random()>.7){
      const dx=(Math.random()-.5)*6,dy=(Math.random()-.5)*6;
      cross.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
      setTimeout(()=>cross.style.transform='translate(-50%,-50%)',60+Math.random()*80);
    }
  },1800);
  document.querySelectorAll('a,button,[onclick]').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
      outer.style.width='58px';outer.style.height='58px';
      outer.style.borderColor='rgba(185,28,46,.75)';
      cross.style.opacity='.5';
    });
    el.addEventListener('mouseleave',()=>{
      outer.style.width='44px';outer.style.height='44px';
      outer.style.borderColor='rgba(185,28,46,.35)';
      cross.style.opacity='1';
    });
  });
})();

(function(){
  const SHAPES=['▪','▫','◆','◇','×','·','▸','◈','◉','▹','◦'];
  const COLS=['rgba(185,28,46,.95)','rgba(255,255,255,.6)','rgba(185,28,46,.6)','rgba(220,220,220,.45)','rgba(140,10,24,.8)','rgba(255,180,180,.35)'];
  let last=0;
  document.addEventListener('mousemove',e=>{
    const now=Date.now();
    if(now-last<12)return;last=now;
    for(let i=0;i<2;i++){
      const p=document.createElement('span');
      const sz=6+Math.random()*14,col=COLS[Math.floor(Math.random()*COLS.length)];
      p.textContent=SHAPES[Math.floor(Math.random()*SHAPES.length)];
      p.style.cssText='position:fixed;left:'+(e.clientX+(Math.random()-.5)*12)+'px;top:'+(e.clientY+(Math.random()-.5)*12)+'px;font-size:'+sz+'px;color:'+col+';pointer-events:none;z-index:99990;transform:translate(-50%,-50%);font-family:monospace;white-space:nowrap;text-shadow:0 0 6px '+col+',0 0 12px '+col+';will-change:transform,opacity;';
      document.body.appendChild(p);
      const tx=(Math.random()-.5)*50,ty=-(8+Math.random()*40),rot=(Math.random()-.5)*240;
      p.animate([
        {opacity:1,transform:`translate(-50%,-50%) rotate(0deg) scale(1)`},
        {opacity:0,transform:`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) rotate(${rot}deg) scale(.15)`}
      ],{duration:320+Math.random()*280,easing:'cubic-bezier(.2,1,.2,1)'}).onfinish=()=>p.remove();
    }
    for(let j=0;j<3;j++){
      const p2=document.createElement('div');
      const w=1+Math.random()*2.5;
      p2.style.cssText='position:fixed;left:'+e.clientX+'px;top:'+e.clientY+'px;width:'+w+'px;height:'+w+'px;background:rgba(185,28,46,.85);border-radius:50%;pointer-events:none;z-index:99989;transform:translate(-50%,-50%);box-shadow:0 0 4px rgba(185,28,46,.5);';
      document.body.appendChild(p2);
      const tx2=(Math.random()-.5)*36,ty2=(Math.random()-.5)*36;
      p2.animate([
        {opacity:.9,transform:`translate(-50%,-50%) scale(1)`},
        {opacity:0,transform:`translate(calc(-50% + ${tx2}px),calc(-50% + ${ty2}px)) scale(.2)`}
      ],{duration:200+Math.random()*220,easing:'ease-out'}).onfinish=()=>p2.remove();
    }
  });
})();
</script>
